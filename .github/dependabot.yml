# SPDX-License-Identifier: Apache-2.0
# Dependency-update tool config (OSSF Scorecard: Dependency-Update-Tool).
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/docker/postgres"
    schedule:
      interval: "weekly"
  # github-actions ecosystem intentionally omitted: this repo has no
  # .github/workflows/ or action.yml, so Dependabot fails with
  # dependency_file_not_found. Re-add when workflow files exist.
